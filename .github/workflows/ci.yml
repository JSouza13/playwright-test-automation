name: CI

# =========================
# ENVIRONMENT
# =========================
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# =========================
# TRIGGERS
# =========================
on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'
  schedule:
    # Executa todo dia às 06:00 UTC (equivalente ao schedule do GitLab)
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      run_coverage:
        description: 'Executar job de Coverage?'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
      run_cadastro_usuario:
        description: 'Executar job de CadastroUsuario?'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

# =========================
# JOBS
# =========================
jobs:

  # -------------------------
  # BUILD: ESLint
  # Sempre executa em qualquer evento — é o validador obrigatório.
  # Se falhar: bloqueia coverage e cadastro-usuario.
  # Se passar: libera execução dos jobs seguintes conforme o evento.
  # -------------------------
  eslint:
    name: Eslint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run eslint

  # -------------------------
  # TESTES: CadastroUsuario
  # Depende do eslint (bloqueante).
  # schedule: executa automaticamente após eslint.
  # workflow_dispatch: executa se usuário selecionou o input.
  # -------------------------
  cadastro-usuario:
    name: CadastroUsuario
    runs-on: ubuntu-latest
    continue-on-error: true
    needs: eslint
    permissions:
      checks: write
      contents: read
    if: |
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && inputs.run_cadastro_usuario == 'true')
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      BASE_URL: ${{ secrets.BASE_URL }}
      SENHA: ${{ secrets.SENHA }}
      BASE_API: ${{ secrets.BASE_API }}
      API_TOKEN: ${{ secrets.API_TOKEN }}
      LOG_INFO: ${{ vars.LOG_INFO }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run CadastroUsuario tests
        run: |
          echo "Executando CadastroUsuario"
          npm run cadastroUsuario

      - name: Generate job info
        if: always()
        run: |
          echo "JOB_NAME=CadastroUsuario" > job_info.txt
          echo "JOB_ID=${{ github.run_id }}" >> job_info.txt
          echo "STATUS_JOB=${{ job.status }}" >> job_info.txt

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: test-results-cadastro-usuario
          path: |
            tests/reports/
            playwright-report/
            job_info.txt
          retention-days: 30

      - name: Publish JUnit report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: 'Playwright JUnit - CadastroUsuario'
          path: 'playwright-report/results.xml'
          reporter: java-junit
          fail-on-error: false
